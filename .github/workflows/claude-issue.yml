name: Claude Code — Implement Issue

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issues:
    types: [opened]

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch_prefix: "claude/"
          use_sticky_comment: true
          track_progress: true
          show_full_output: false
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: #${{ github.event.issue.number }}

            Implement the feature or fix described in GitHub issue #${{ github.event.issue.number }}:

            Title: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Requirements:
            - Create a focused, minimal implementation that directly addresses the issue.
            - Follow the existing code style and conventions in this repository.
            - Write the code and commit it to the branch.

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git ls-remote --heads origin 'claude/issue-${{ github.event.issue.number }}-*' | awk '{print $2}' | sed 's|refs/heads/||' | sort | tail -1)
          if [ -z "$BRANCH" ]; then
            echo "No claude branch found, skipping PR creation"
            exit 0
          fi
          # Skip if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH"
            exit 0
          fi
          gh pr create \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --base main \
            --head "$BRANCH"